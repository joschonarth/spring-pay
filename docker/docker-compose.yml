services:
  mysql:
    image: mysql
    ports:
      - "3306:3306"
    expose:
      - "3306"
    environment:
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=admin123
      - MYSQL_DATABASE=springpaydb
      - MYSQL_ROOT_PASSWORD=admin123
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: